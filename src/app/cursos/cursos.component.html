<!-- 4. CURSOS Y EDUCACIÓN -->
<div class="courses-section" id="cursos">
  <h2 class="section-title2">TESTIMONIOS</h2>
  <!-- Botón izquierda (oculto en móviles con CSS) -->
  <!-- Botón izquierda -->
  <button class="carousel-btn left" (click)="prevSlide()">
    <div class="arrow">
      <div class="arrow-top"></div>
      <div class="arrow-bottom"></div>
    </div>
  </button>

  <div class="carousel" #carousel (touchstart)="onTouchStart($event)" (touchmove)="onTouchMove($event)"
    (touchend)="onTouchEnd()" (pointerdown)="onPointerDown($event)" (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp($event)" (touchcancel)="onTouchEnd()">

    <!-- Track -->
    <div class="carousel-track" #track (transitionend)="onTransitionEnd()"
      [style.transform]="'translateX(' + currentTranslate + 'px)'">

      <div class="card" *ngFor="let course of slides">
        <div class="top-section testimonial-top">
          <div class="border"></div>
          <div class="testimonial-icon" aria-hidden="true">
            <i class="fas fa-user"></i>
          </div>
        </div>
        <div class="bottom-section testimonial-bottom">
          <span class="title">{{ course.name }}</span>
          <p class="testimonial-text">"{{ course.text }}"</p>
          <span class="testimonial-tag">{{ course.focus }}</span>
        </div>
      </div>
    </div>

  </div>
  <!-- Botón derecha (oculto en móviles con CSS) -->
  <!-- Botón derecha -->
  <button class="carousel-btn right" (click)="nextSlide()">
    <div class="arrow arrow-right">
      <div class="arrow-top"></div>
      <div class="arrow-bottom"></div>
    </div>
  </button>
</div>
